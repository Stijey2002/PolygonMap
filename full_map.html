<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="referrer" content="origin">
        <title>Polygon Map</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <style>
            body { margin: 0; }
            #map { height: 100vh; }
            #inputBox {
              position: absolute;
              top: 10px;
              left: 10px;
              z-index: 1000;
              background: white;
              padding: 10px;
              border-radius: 8px;
              width: 300px;
            }
            
            .marker-icon-FUE {
                background: #B5D7DA;
                border: 2px solid #21888F;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;

                transform-origin: center;
                transition: transform 0.15s ease;
            }
            
            .marker-icon-OTK {
                background: #FFD4C5;
                border: 2px solid #FF7F50;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;

                transform-origin: center;
                transition: transform 0.15s ease;
            }

            .marker-icon-MAU {
                background: #E6D4C3;
                border: 2px solid #B57D4A;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;

                transform-origin: center;
                transition: transform 0.15s ease;
            }
            
            .marker-text {
                color: black;
                font-weight: bold;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script>
            let polygonData = [];
            const map = L.map('map').setView([48.2, 16.37], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            async function loadPolygons() {
                try {
                    const response = await fetch('polygon_data.json');
                    polygonData = await response.json();
                    drawPolygons();
                } catch (e) {
                    console.error(e);
                }
            }
            
            function drawPolygons() {
                polygonData.forEach(item => {
                    let markerIconClass = '';
                    let polygonColor = '';
                    if (1600 <= item.n && item.n < 1700) {
                        markerIconClass = 'marker-icon-OTK';
                        polygonColor = '#FF7F50';
                    }
                    else if (1500 <= item.n && item.n < 1600) {
                        markerIconClass = 'marker-icon-FUE';
                        polygonColor = '#21888F';
                    }
                    else if (3000 <= item.n && item.n < 3100) {
                        markerIconClass = 'marker-icon-MAU';
                        polygonColor = '#B57D4A';
                    }
                    const polygon = L.polygon(item.coords, {
                        color: `${polygonColor}`
                    }).addTo(map);
                    if (item.n === 1599) map.fitBounds(polygon.getBounds());
                    L.marker(polygon.getBounds().getCenter(), {
                        icon: L.divIcon({
                          className: `${markerIconClass}`,
                          html: `<div class="marker-text">${item.original_n}</div>`,
                          iconSize: [32, 24]
                        })
                    }).addTo(map);
                });
            }
            
            loadPolygons();
        </script>
    </body>
</html>
